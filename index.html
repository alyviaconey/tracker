<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2a2a2e">
<title>Daily Nutrient Tracker</title>
<style>
  :root {
    --bg: #2a2a2e;
    --card: #36363c;
    --card-2: #3f3f46;
    --ink: #f5f5f0;
    --muted: #b0b0a8;
    --subtle: #7e7e78;
    --border: #4a4a52;
    --border-strong: #5a5a62;
    --accent: #39ff88;
    --accent-soft: rgba(57, 255, 136, 0.15);
    --warn: #ffb547;
    --warn-soft: rgba(255, 181, 71, 0.15);
    --danger: #ff2d55;
    --danger-soft: rgba(255, 45, 85, 0.18);
    --danger-bg: rgba(255, 45, 85, 0.12);
    --danger-text: #ff9db0;
    --progress-bg: #202024;

    /* Neon accent palette for tags */
    --neon-magenta: #ff3bd4;
    --neon-blue: #5ac8fa;
    --neon-green: #39ff88;
    --neon-orange: #ff9f40;
    --neon-yellow: #ffe14a;
    --neon-purple: #c77dff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body { overscroll-behavior-y: none; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    padding: max(env(safe-area-inset-top), 1rem) max(env(safe-area-inset-right), 1rem) max(env(safe-area-inset-bottom), 1rem) max(env(safe-area-inset-left), 1rem);
    font-size: 15px;
    -webkit-text-size-adjust: 100%;
  }

  .container { max-width: 1200px; margin: 0 auto; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    padding-bottom: 0.9rem;
    border-bottom: 1px solid var(--border);
  }

  h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
  .date { color: var(--muted); font-size: 0.85rem; margin-top: 0.2rem; }
  .header-actions { display: flex; gap: 0.4rem; }

  button {
    font-family: inherit;
    cursor: pointer;
    border: 1px solid var(--border-strong);
    background: var(--card);
    color: var(--ink);
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 500;
    transition: all 0.15s;
    min-height: 36px;
  }

  button:active { background: var(--card-2); transform: scale(0.97); }
  button.primary { background: var(--neon-green); color: #0a0a0a; border-color: var(--neon-green); font-weight: 700; }
  button.ghost { border-color: transparent; background: transparent; color: var(--muted); }

  .tabs {
    display: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 1rem;
    gap: 3px;
  }

  .tab {
    flex: 1;
    padding: 0.55rem;
    text-align: center;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab.active { background: var(--neon-green); color: #0a0a0a; }

  @media (max-width: 768px) {
    .tabs { display: flex; }
    h1 { font-size: 1.3rem; }
    body { padding: max(env(safe-area-inset-top), 0.75rem) 0.75rem max(env(safe-area-inset-bottom), 0.75rem) 0.75rem; }
  }

  .rails {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  @media (max-width: 768px) {
    .rails { grid-template-columns: repeat(3, 1fr); gap: 0.4rem; }
  }

  .rail {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.7rem;
  }

  .rail-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.4rem;
    gap: 0.3rem;
  }

  .rail-name {
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--muted);
    line-height: 1.1;
  }

  .rail-value { font-size: 0.85rem; font-weight: 700; white-space: nowrap; }
  .rail-value .target { color: var(--subtle); font-weight: 400; font-size: 0.72rem; }

  .progress {
    height: 5px;
    background: var(--progress-bg);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--neon-green);
    transition: width 0.3s ease;
    border-radius: 3px;
  }

  .progress-bar.partial { background: var(--neon-orange); }
  .progress-bar.low { background: var(--danger); }

  /* Per-nutrient rail colours */
  .rail[data-nutrient="fib"] .rail-name { color: var(--neon-orange); }
  .rail[data-nutrient="fib"] .progress-bar { background: var(--neon-orange); }

  .rail[data-nutrient="pro"] .rail-name { color: var(--neon-purple); }
  .rail[data-nutrient="pro"] .progress-bar { background: var(--neon-purple); }

  .rail[data-nutrient="iro"] .rail-name { color: #ff6b85; }
  .rail[data-nutrient="iro"] .progress-bar { background: var(--danger); }

  .rail[data-nutrient="ome"] .rail-name { color: var(--neon-blue); }
  .rail[data-nutrient="ome"] .progress-bar { background: var(--neon-blue); }

  .rail[data-nutrient="b12"] .rail-name { color: var(--neon-yellow); }
  .rail[data-nutrient="b12"] .progress-bar { background: var(--neon-yellow); }

  .rail[data-nutrient="fol"] .rail-name { color: var(--neon-green); }
  .rail[data-nutrient="fol"] .progress-bar { background: var(--neon-green); }

  /* Low state still overrides with red to signal urgency */
  .rail .progress-bar.low { background: var(--danger); }

  .gap-banner {
    background: var(--danger-bg);
    border: 1px solid var(--danger);
    border-radius: 8px;
    padding: 0.7rem 0.9rem;
    margin-bottom: 1.25rem;
    font-size: 0.88rem;
    color: var(--danger-text);
    display: flex;
    gap: 0.6rem;
    align-items: flex-start;
  }

  .gap-banner.covered {
    background: var(--accent-soft);
    border-color: var(--neon-green);
    color: var(--neon-green);
  }

  .gap-banner-icon { font-size: 1.1rem; flex-shrink: 0; font-weight: 700; color: var(--danger); }
  .gap-banner.covered .gap-banner-icon { color: var(--neon-green); }
  .gap-banner-body strong { display: block; margin-bottom: 0.15rem; font-size: 0.9rem; color: #ffc4cf; }
  .gap-banner.covered .gap-banner-body strong { color: var(--neon-green); }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 1.25rem;
  }

  @media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; gap: 0; }
    .panel.hidden-mobile { display: none; }
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
  }

  .panel-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.15rem; }
  .panel-sub { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.9rem; }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
    margin-bottom: 0.9rem;
  }

  .panel-header .panel-title { margin-bottom: 0.1rem; }
  .panel-header .panel-sub { margin-bottom: 0; }

  .category { margin-bottom: 1rem; }
  .category:last-child { margin-bottom: 0; }

  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 0.35rem;
    margin-bottom: 0.45rem;
    border-bottom: 1px solid var(--border);
  }

  .category-name {
    font-size: 0.74rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }

  .category-count { font-size: 0.72rem; color: var(--subtle); }

  .foods {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 0.35rem;
  }

  @media (max-width: 480px) {
    .foods { grid-template-columns: 1fr 1fr; }
  }

  .food {
    display: flex;
    align-items: flex-start;
    gap: 0.45rem;
    padding: 0.5rem 0.55rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
    -webkit-user-select: none;
    font-size: 0.85rem;
    background: var(--card);
    min-height: 44px;
  }

  .food:active { background: var(--card-2); }

  .food.checked {
    background: var(--accent-soft);
    border-color: var(--neon-green);
  }

  .food-check {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border-strong);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
    position: relative;
    transition: all 0.12s;
  }

  .food.checked .food-check { background: var(--neon-green); border-color: var(--neon-green); }

  .food.checked .food-check::after {
    content: "";
    position: absolute;
    left: 5px;
    top: 1px;
    width: 4px;
    height: 9px;
    border: solid #0a0a0a;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .food-body { flex: 1; min-width: 0; }
  .food-name { font-weight: 500; line-height: 1.3; }

  .food-tags { display: flex; gap: 0.2rem; flex-wrap: wrap; margin-top: 0.2rem; }

  .tag {
    font-size: 0.62rem;
    padding: 1px 5px;
    border-radius: 8px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    background: var(--card-2);
    color: var(--muted);
    border: 1px solid transparent;
  }

  .tag.fib { background: rgba(255, 159, 64, 0.15); color: var(--neon-orange); border-color: rgba(255, 159, 64, 0.4); }
  .tag.pro { background: rgba(199, 125, 255, 0.15); color: var(--neon-purple); border-color: rgba(199, 125, 255, 0.4); }
  .tag.iro { background: rgba(255, 45, 85, 0.15); color: #ff6b85; border-color: rgba(255, 45, 85, 0.4); }
  .tag.ome { background: rgba(90, 200, 250, 0.15); color: var(--neon-blue); border-color: rgba(90, 200, 250, 0.4); }
  .tag.b12 { background: rgba(255, 225, 74, 0.15); color: var(--neon-yellow); border-color: rgba(255, 225, 74, 0.4); }
  .tag.fol { background: rgba(57, 255, 136, 0.15); color: var(--neon-green); border-color: rgba(57, 255, 136, 0.4); }

  .grocery-list { list-style: none; }

  .grocery-item {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.55rem 0.3rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
    min-height: 44px;
  }

  .grocery-item:active { background: var(--card-2); }
  .grocery-item:last-child { border-bottom: none; }

  .grocery-check {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--border-strong);
    border-radius: 4px;
    flex-shrink: 0;
    position: relative;
    transition: all 0.12s;
  }

  .grocery-item.needed .grocery-check {
    background: var(--danger-bg);
    border-color: var(--danger);
  }

  .grocery-item.needed .grocery-check::after {
    content: "!";
    position: absolute;
    left: 0;
    right: 0;
    top: -2px;
    text-align: center;
    font-weight: 700;
    color: var(--danger);
    font-size: 0.85rem;
  }

  .grocery-item.stocked { opacity: 0.45; }
  .grocery-item-body { flex: 1; min-width: 0; }
  .grocery-item-name { font-size: 0.88rem; font-weight: 500; }

  .grocery-item.stocked .grocery-item-name {
    color: var(--muted);
  }

  .grocery-item-tags { display: flex; gap: 0.2rem; flex-wrap: wrap; margin-top: 0.2rem; }
  .grocery-item-actions { display: flex; gap: 0.2rem; }

  .item-btn {
    background: transparent;
    border: none;
    color: var(--subtle);
    font-size: 1.1rem;
    padding: 0.3rem 0.4rem;
    cursor: pointer;
    border-radius: 4px;
    min-height: 32px;
    min-width: 32px;
    line-height: 1;
  }

  .item-btn:active { background: var(--card-2); color: var(--ink); }

  .status-legend {
    display: flex;
    gap: 0.8rem;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
    flex-wrap: wrap;
  }

  .status-legend-item { display: flex; align-items: center; gap: 0.3rem; }

  .status-legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    border: 1.5px solid var(--border-strong);
    position: relative;
  }

  .status-legend-dot.needed {
    background: var(--danger-bg);
    border-color: var(--danger);
  }

  .status-legend-dot.needed::after {
    content: "!";
    position: absolute;
    left: 0;
    right: 0;
    top: -3px;
    text-align: center;
    font-weight: 700;
    color: var(--danger);
    font-size: 0.7rem;
  }

  .add-form {
    background: var(--card-2);
    border: 1px dashed var(--border-strong);
    border-radius: 6px;
    padding: 0.75rem;
    margin-bottom: 0.8rem;
  }

  .add-form.hidden { display: none; }

  .add-form input[type="text"] {
    width: 100%;
    padding: 0.6rem 0.7rem;
    border: 1px solid var(--border-strong);
    border-radius: 5px;
    font-size: 0.9rem;
    font-family: inherit;
    margin-bottom: 0.55rem;
    background: var(--bg);
    color: var(--ink);
  }

  .add-form input[type="text"]::placeholder { color: var(--subtle); }
  .add-form input[type="text"]:focus { outline: none; border-color: var(--neon-green); }

  .tag-picker-label {
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 0.35rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }

  .tag-picker { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.6rem; }

  .tag-pick {
    font-size: 0.7rem;
    padding: 0.35rem 0.6rem;
    border-radius: 12px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    cursor: pointer;
    user-select: none;
    color: var(--muted);
    min-height: 32px;
  }

  .tag-pick.active.fib { background: rgba(255, 159, 64, 0.15); color: var(--neon-orange); border-color: var(--neon-orange); }
  .tag-pick.active.pro { background: rgba(199, 125, 255, 0.15); color: var(--neon-purple); border-color: var(--neon-purple); }
  .tag-pick.active.iro { background: rgba(255, 45, 85, 0.15); color: #ff6b85; border-color: var(--danger); }
  .tag-pick.active.ome { background: rgba(90, 200, 250, 0.15); color: var(--neon-blue); border-color: var(--neon-blue); }
  .tag-pick.active.b12 { background: rgba(255, 225, 74, 0.15); color: var(--neon-yellow); border-color: var(--neon-yellow); }
  .tag-pick.active.fol { background: rgba(57, 255, 136, 0.15); color: var(--neon-green); border-color: var(--neon-green); }

  .add-form-actions { display: flex; gap: 0.4rem; }
  .add-form-actions button { flex: 1; }

  @media print {
    :root {
      --bg: white;
      --card: white;
      --card-2: #f5f5f0;
      --ink: #1a1a1a;
      --muted: #555;
      --subtle: #888;
      --border: #ccc;
      --border-strong: #999;
      --progress-bg: #eee;
      --danger-bg: #fee;
      --danger-text: #7a1020;
      --accent-soft: #e3f1ea;
    }
    body { background: white; color: #1a1a1a; padding: 0.5in; font-size: 10pt; }
    .header-actions, .tabs, .add-form, .item-btn { display: none !important; }
    .panel, .rail { border: 1px solid #ccc; break-inside: avoid; background: white; }
    .main-grid { grid-template-columns: 1fr 1fr; }
    .panel.hidden-mobile { display: block !important; }
    .foods { grid-template-columns: repeat(2, 1fr); }
    .food, .grocery-item { background: white; }
    .gap-banner-body strong { color: #7a1020; }
    .tag { background: #f0ede3; color: #555; border-color: transparent; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Daily Nutrient Tracker</h1>
        <div class="date" id="date"></div>
      </div>
      <div class="header-actions">
        <button class="ghost" onclick="resetDay()">Reset</button>
        <button onclick="window.print()">Print</button>
      </div>
    </header>

    <div class="rails" id="rails"></div>
    <div id="gap-banner"></div>

    <div class="tabs">
      <div class="tab active" data-tab="foods" onclick="switchTab('foods')">Today's foods</div>
      <div class="tab" data-tab="grocery" onclick="switchTab('grocery')">Grocery list</div>
    </div>

    <div class="main-grid">
      <div class="panel" id="foods-panel">
        <div class="panel-title">Today's foods</div>
        <div class="panel-sub">Tap foods you've eaten today. Progress resets at midnight.</div>
        <div id="food-categories"></div>
      </div>

      <aside class="panel hidden-mobile" id="grocery-panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">Grocery list</div>
            <div class="panel-sub">Tap to mark "need to buy" / stocked.</div>
          </div>
          <button onclick="toggleAddForm()">+ Add</button>
        </div>

        <div class="add-form hidden" id="add-form">
          <input type="text" id="new-item-name" placeholder="Food name (e.g., walnuts)" autocomplete="off">
          <div class="tag-picker-label">Tags (optional)</div>
          <div class="tag-picker" id="tag-picker"></div>
          <div class="add-form-actions">
            <button onclick="cancelAdd()">Cancel</button>
            <button class="primary" onclick="addItem()">Add</button>
          </div>
        </div>

        <div class="status-legend">
          <div class="status-legend-item"><span class="status-legend-dot needed"></span> Need to buy</div>
          <div class="status-legend-item"><span class="status-legend-dot"></span> Stocked</div>
        </div>

        <ul class="grocery-list" id="grocery-list"></ul>
      </aside>
    </div>
  </div>

<script>
  const FOODS = [
    { cat: 'Proteins', name: 'Salmon', tags: ['pro', 'ome', 'b12'] },
    { cat: 'Proteins', name: 'Tuna (nigiri)', tags: ['pro', 'ome', 'b12'] },
    { cat: 'Proteins', name: 'Trout', tags: ['pro', 'ome', 'b12'] },
    { cat: 'Proteins', name: 'Shrimp', tags: ['pro', 'b12'] },
    { cat: 'Proteins', name: 'Steak', tags: ['pro', 'iro', 'b12'] },
    { cat: 'Proteins', name: 'Chicken', tags: ['pro'] },
    { cat: 'Proteins', name: 'Egg whites', tags: ['pro', 'b12'] },
    { cat: 'Proteins', name: 'Sardines', tags: ['pro', 'ome', 'b12', 'iro'] },

    { cat: 'Dairy', name: 'Skyr', tags: ['pro', 'b12'] },
    { cat: 'Dairy', name: 'Cottage cheese', tags: ['pro', 'b12'] },
    { cat: 'Dairy', name: 'Protein milk', tags: ['pro', 'b12'] },

    { cat: 'Seeds & Nuts', name: 'Chia seeds', tags: ['fib', 'ome'], fibType: 'gel' },
    { cat: 'Seeds & Nuts', name: 'Ground flax', tags: ['fib', 'ome', 'iro'], fibType: 'gel' },
    { cat: 'Seeds & Nuts', name: 'Walnuts', tags: ['ome', 'fib'] },
    { cat: 'Seeds & Nuts', name: 'Pumpkin seeds', tags: ['iro', 'fib'] },
    { cat: 'Seeds & Nuts', name: 'Almonds', tags: ['fib', 'iro'] },
    { cat: 'Seeds & Nuts', name: 'Cashews', tags: ['iro', 'fib'] },
    { cat: 'Seeds & Nuts', name: 'PB2 / peanut butter', tags: ['pro', 'fib', 'fol'] },

    { cat: 'Grains', name: 'Rolled oats', tags: ['fib', 'iro'], fibType: 'betaglucan' },
    { cat: 'Grains', name: 'Popcorn', tags: ['fib'] },
    { cat: 'Grains', name: 'Whole grain crackers', tags: ['fib'], fibType: 'arabinoxylan' },
    { cat: 'Grains', name: 'Whole grain flour (bagels)', tags: ['fib'], fibType: 'arabinoxylan' },
    { cat: 'Grains', name: 'Sushi rice (cooled)', tags: ['fib'], fibType: 'resistant' },
    { cat: 'Grains', name: 'Fibre 1', tags: ['fib'] },

    { cat: 'Legumes', name: 'Lentils', tags: ['pro', 'fib', 'iro', 'fol'], fibType: 'resistant' },
    { cat: 'Legumes', name: 'Red / white kidney beans', tags: ['pro', 'fib', 'iro', 'fol'], fibType: 'resistant' },
    { cat: 'Legumes', name: 'Chickpeas', tags: ['pro', 'fib', 'iro', 'fol'], fibType: 'resistant' },

    { cat: 'Vegetables', name: 'Kale', tags: ['fib', 'iro', 'fol'] },
    { cat: 'Vegetables', name: 'Brussels sprouts', tags: ['fib', 'fol'] },
    { cat: 'Vegetables', name: 'Kalettes', tags: ['fib', 'fol'] },
    { cat: 'Vegetables', name: 'Spinach', tags: ['iro', 'fol'] },
    { cat: 'Vegetables', name: 'Green peas', tags: ['fib', 'fol'] },
    { cat: 'Vegetables', name: 'Avocado', tags: ['fib', 'fol'] },
    { cat: 'Vegetables', name: 'Onion / garlic', tags: ['fib'] },
    { cat: 'Vegetables', name: 'Yam', tags: ['fib'] },
    { cat: 'Vegetables', name: 'Cooled potato', tags: ['fib'], fibType: 'resistant' },
    { cat: 'Vegetables', name: 'Seaweed', tags: ['fib', 'iro', 'b12'] },

    { cat: 'Fruits', name: 'Raspberries', tags: ['fib'] },
    { cat: 'Fruits', name: 'Blueberries', tags: ['fib'] },
    { cat: 'Fruits', name: 'Apples', tags: ['fib'] },
    { cat: 'Fruits', name: 'Mango', tags: ['fib', 'fol'] },
    { cat: 'Fruits', name: 'Honeydew', tags: ['fol'] },
    { cat: 'Fruits', name: 'Dried apricot', tags: ['fib', 'iro'] },

    { cat: 'Other', name: 'Kombucha', tags: [] },
    { cat: 'Other', name: 'Nutritional yeast', tags: ['b12', 'fol'] },
    { cat: 'Other', name: 'Matcha', tags: [] },
    { cat: 'Other', name: 'Dark chocolate 70%+', tags: ['iro', 'fib'] },
  ];

  const NUTRIENTS = [
    { key: 'fib', label: 'Fibre types', target: 6, type: 'fibre' },
    { key: 'pro', label: 'Protein', target: 3 },
    { key: 'iro', label: 'Iron', target: 3 },
    { key: 'ome', label: 'Omega-3', target: 1 },
    { key: 'b12', label: 'B12', target: 2 },
    { key: 'fol', label: 'Folate', target: 3 },
  ];

  const TAG_LABELS = { fib: 'Fibre', pro: 'Protein', iro: 'Iron', ome: 'Omega-3', b12: 'B12', fol: 'Folate' };
  const FIBRE_SUBTYPES = ['gel', 'betaglucan', 'arabinoxylan', 'resistant'];

  const DEFAULT_GROCERY = [
    { name: 'Skyr', tags: ['pro', 'b12'], needed: false },
    { name: 'Cottage cheese', tags: ['pro', 'b12'], needed: false },
    { name: 'Protein milk', tags: ['pro', 'b12'], needed: false },
    { name: 'Salmon', tags: ['pro', 'ome', 'b12'], needed: false },
    { name: 'Trout', tags: ['pro', 'ome', 'b12'], needed: false },
    { name: 'Steak', tags: ['pro', 'iro', 'b12'], needed: false },
    { name: 'Chicken', tags: ['pro'], needed: false },
    { name: 'Shrimp', tags: ['pro', 'b12'], needed: false },
    { name: 'Egg whites', tags: ['pro', 'b12'], needed: false },
    { name: 'Rolled oats', tags: ['fib', 'iro'], needed: false },
    { name: 'Chia seeds', tags: ['fib', 'ome'], needed: false },
    { name: 'Ground flax', tags: ['fib', 'ome', 'iro'], needed: false },
    { name: 'Almonds', tags: ['fib', 'iro'], needed: false },
    { name: 'Cashews', tags: ['iro', 'fib'], needed: false },
    { name: 'PB2', tags: ['pro', 'fib'], needed: false },
    { name: 'Whole grain flour', tags: ['fib'], needed: false },
    { name: 'Whole grain crackers', tags: ['fib'], needed: false },
    { name: 'Popcorn', tags: ['fib'], needed: false },
    { name: 'Sushi rice', tags: ['fib'], needed: false },
    { name: 'Fibre 1', tags: ['fib'], needed: false },
    { name: 'Lentils', tags: ['pro', 'fib', 'iro', 'fol'], needed: false },
    { name: 'Kidney beans', tags: ['pro', 'fib', 'iro', 'fol'], needed: false },
    { name: 'Kale', tags: ['fib', 'iro', 'fol'], needed: false },
    { name: 'Brussels sprouts', tags: ['fib', 'fol'], needed: false },
    { name: 'Kalettes', tags: ['fib', 'fol'], needed: false },
    { name: 'Green peas', tags: ['fib', 'fol'], needed: false },
    { name: 'Avocado', tags: ['fib', 'fol'], needed: false },
    { name: 'Onion', tags: ['fib'], needed: false },
    { name: 'Garlic', tags: ['fib'], needed: false },
    { name: 'Cooled potato', tags: ['fib'], needed: false },
    { name: 'Yam', tags: ['fib'], needed: false },
    { name: 'Seaweed', tags: ['fib', 'iro', 'b12'], needed: false },
    { name: 'Raspberries', tags: ['fib'], needed: false },
    { name: 'Blueberries', tags: ['fib'], needed: false },
    { name: 'Apples', tags: ['fib'], needed: false },
    { name: 'Mango', tags: ['fib', 'fol'], needed: false },
    { name: 'Honeydew', tags: ['fol'], needed: false },
    { name: 'Dried apricot', tags: ['fib', 'iro'], needed: false },
    { name: 'Kombucha', tags: [], needed: false },
    { name: 'Matcha', tags: [], needed: false },
    { name: 'Dark chocolate 70%+', tags: ['iro', 'fib'], needed: false },
    { name: 'Nutritional yeast', tags: ['b12', 'fol'], needed: false },
  ];

  let state = loadState();
  let addFormTags = new Set();

  function todayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function loadState() {
    try {
      const raw = JSON.parse(localStorage.getItem('nutrientTrackerV2') || 'null');
      if (!raw) {
        return { day: todayKey(), checked: {}, grocery: JSON.parse(JSON.stringify(DEFAULT_GROCERY)) };
      }
      const checked = raw.day === todayKey() ? (raw.checked || {}) : {};
      const grocery = raw.grocery && raw.grocery.length ? raw.grocery : JSON.parse(JSON.stringify(DEFAULT_GROCERY));
      return { day: todayKey(), checked, grocery };
    } catch {
      return { day: todayKey(), checked: {}, grocery: JSON.parse(JSON.stringify(DEFAULT_GROCERY)) };
    }
  }

  function saveState() {
    try { localStorage.setItem('nutrientTrackerV2', JSON.stringify(state)); } catch {}
  }

  function resetDay() {
    if (!confirm("Reset today's checked foods?")) return;
    state.checked = {};
    saveState();
    render();
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
    document.getElementById('foods-panel').classList.toggle('hidden-mobile', tab !== 'foods');
    document.getElementById('grocery-panel').classList.toggle('hidden-mobile', tab !== 'grocery');
  }

  function getCheckedFoods() {
    return FOODS.filter(f => state.checked[f.name]);
  }

  function getFibreSubtypesCovered() {
    const checked = getCheckedFoods();
    const covered = new Set();
    let hasGeneralFibre = false;
    for (const f of checked) {
      if (f.tags.includes('fib')) {
        if (f.fibType) covered.add(f.fibType);
        else hasGeneralFibre = true;
      }
    }
    if (hasGeneralFibre) covered.add('general');
    return covered;
  }

  function countNutrient(key) {
    return getCheckedFoods().filter(f => f.tags.includes(key)).length;
  }

  function render() {
    document.getElementById('date').textContent = new Date().toLocaleDateString('en-CA', {
      weekday: 'long', month: 'long', day: 'numeric'
    });
    renderRails();
    renderGapBanner();
    renderFoods();
    renderGrocery();
  }

  function renderRails() {
    const container = document.getElementById('rails');
    container.innerHTML = '';
    const fibreCovered = getFibreSubtypesCovered();

    for (const n of NUTRIENTS) {
      let current;
      if (n.type === 'fibre') current = fibreCovered.size;
      else current = countNutrient(n.key);
      const pct = Math.min(100, (current / n.target) * 100);
      // Only flag as "low" (red) if nothing checked yet — otherwise use the nutrient's own colour
      const barClass = current === 0 ? 'low' : '';

      const rail = document.createElement('div');
      rail.className = 'rail';
      rail.setAttribute('data-nutrient', n.key);
      rail.innerHTML = `
        <div class="rail-header">
          <span class="rail-name">${n.label}</span>
          <span class="rail-value">${current}<span class="target"> / ${n.target}</span></span>
        </div>
        <div class="progress"><div class="progress-bar ${barClass}" style="width: ${pct}%"></div></div>
      `;
      container.appendChild(rail);
    }
  }

  function renderGapBanner() {
    const el = document.getElementById('gap-banner');
    const fibreCovered = getFibreSubtypesCovered();
    const missingFibre = FIBRE_SUBTYPES.filter(s => !fibreCovered.has(s));
    const underTarget = NUTRIENTS.filter(n => {
      if (n.type === 'fibre') return false;
      return countNutrient(n.key) < n.target;
    });

    if (missingFibre.length === 0 && underTarget.length === 0) {
      el.className = 'gap-banner covered';
      el.innerHTML = `
        <div class="gap-banner-icon">✓</div>
        <div class="gap-banner-body"><strong>All nutrients covered today</strong>Great work — nothing urgent.</div>
      `;
      return;
    }

    const fibreLabels = {
      gel: 'gel-forming (chia/flax)',
      betaglucan: 'beta-glucan (oats)',
      arabinoxylan: 'arabinoxylan (whole grain)',
      resistant: 'resistant starch (cooled starch/legumes)'
    };

    const gaps = [];
    for (const m of missingFibre) gaps.push(fibreLabels[m]);
    for (const n of underTarget) {
      const short = n.target - countNutrient(n.key);
      gaps.push(`${n.label.toLowerCase()} (${short} more)`);
    }

    el.className = 'gap-banner';
    el.innerHTML = `
      <div class="gap-banner-icon">!</div>
      <div class="gap-banner-body">
        <strong>Today's gaps</strong>${gaps.join(' · ')}
      </div>
    `;
  }

  function renderFoods() {
    const container = document.getElementById('food-categories');
    container.innerHTML = '';
    const categories = [...new Set(FOODS.map(f => f.cat))];

    for (const cat of categories) {
      const catFoods = FOODS.filter(f => f.cat === cat);
      const checkedCount = catFoods.filter(f => state.checked[f.name]).length;

      const catDiv = document.createElement('div');
      catDiv.className = 'category';
      catDiv.innerHTML = `
        <div class="category-header">
          <span class="category-name">${cat}</span>
          <span class="category-count">${checkedCount} / ${catFoods.length}</span>
        </div>
        <div class="foods">
          ${catFoods.map(f => `
            <div class="food ${state.checked[f.name] ? 'checked' : ''}" data-name="${escapeAttr(f.name)}">
              <div class="food-check"></div>
              <div class="food-body">
                <div class="food-name">${escapeHtml(f.name)}</div>
                ${f.tags.length ? `<div class="food-tags">${f.tags.map(t => `<span class="tag ${t}">${TAG_LABELS[t]}</span>`).join('')}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
      container.appendChild(catDiv);
    }

    container.querySelectorAll('.food').forEach(el => {
      el.addEventListener('click', () => {
        const name = el.dataset.name;
        state.checked[name] = !state.checked[name];
        saveState();
        render();
      });
    });
  }

  function renderGrocery() {
    const list = document.getElementById('grocery-list');
    list.innerHTML = '';

    const sorted = [...state.grocery].sort((a, b) => {
      if (a.needed !== b.needed) return a.needed ? -1 : 1;
      return a.name.localeCompare(b.name);
    });

    if (sorted.length === 0) {
      list.innerHTML = '<li style="padding: 1rem; text-align: center; color: var(--subtle); font-size: 0.85rem;">No items yet. Tap + Add.</li>';
      return;
    }

    sorted.forEach((item, idx) => {
      const li = document.createElement('li');
      li.className = 'grocery-item ' + (item.needed ? 'needed' : 'stocked');
      li.innerHTML = `
        <div class="grocery-check"></div>
        <div class="grocery-item-body">
          <div class="grocery-item-name">${escapeHtml(item.name)}</div>
          ${item.tags && item.tags.length ? `<div class="grocery-item-tags">${item.tags.map(t => `<span class="tag ${t}">${TAG_LABELS[t] || t}</span>`).join('')}</div>` : ''}
        </div>
        <div class="grocery-item-actions">
          <button class="item-btn" data-action="delete" title="Delete">×</button>
        </div>
      `;

      li.addEventListener('click', (e) => {
        if (e.target.closest('[data-action="delete"]')) return;
        item.needed = !item.needed;
        saveState();
        render();
      });

      li.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
        e.stopPropagation();
        if (confirm(`Remove "${item.name}" from list?`)) {
          state.grocery = state.grocery.filter(g => g !== item);
          saveState();
          render();
        }
      });

      list.appendChild(li);
    });
  }

  function toggleAddForm() {
    const form = document.getElementById('add-form');
    const isHidden = form.classList.contains('hidden');
    if (isHidden) {
      form.classList.remove('hidden');
      renderTagPicker();
      setTimeout(() => document.getElementById('new-item-name').focus(), 50);
    } else {
      cancelAdd();
    }
  }

  function renderTagPicker() {
    const picker = document.getElementById('tag-picker');
    picker.innerHTML = '';
    for (const [key, label] of Object.entries(TAG_LABELS)) {
      const btn = document.createElement('div');
      btn.className = 'tag-pick ' + key + (addFormTags.has(key) ? ' active' : '');
      btn.textContent = label;
      btn.onclick = () => {
        if (addFormTags.has(key)) addFormTags.delete(key);
        else addFormTags.add(key);
        renderTagPicker();
      };
      picker.appendChild(btn);
    }
  }

  function addItem() {
    const input = document.getElementById('new-item-name');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }

    if (state.grocery.some(g => g.name.toLowerCase() === name.toLowerCase())) {
      alert(`"${name}" is already on your list.`);
      return;
    }

    state.grocery.push({
      name,
      tags: [...addFormTags],
      needed: true
    });
    saveState();
    cancelAdd();
    render();
  }

  function cancelAdd() {
    document.getElementById('add-form').classList.add('hidden');
    document.getElementById('new-item-name').value = '';
    addFormTags.clear();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
  function escapeAttr(str) {
    return String(str).replace(/"/g, '&quot;');
  }

  // Enter key adds item
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'new-item-name') {
      addItem();
    }
  });

  render();

  // Handle date rollover if tab stays open
  setInterval(() => {
    if (state.day !== todayKey()) {
      state.day = todayKey();
      state.checked = {};
      saveState();
      render();
    }
  }, 60000);
</script>
</body>
</html>
